version: '3.8'

services:
  inventory:
    build: ./inventory-service
    container_name: inventory
    ports:
      - "${INVENTORY_PORT}:3000"
    environment:
      - PORT=3000
      - HOST=${INVENTORY_HOST}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - NOTIFICATION_URL=http://notification:3002/notify
      - ALERT_RECIPIENT=${ALERT_RECIPIENT}
    networks:
      - stockwatch-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - FRONTEND_HOST=0.0.0.0
      - API=${API}
    depends_on:
      - inventory
    networks:
      - stockwatch-net
    restart: unless-stopped
  
  notification:
    build: ./notification-service
    container_name: notification
    ports:
      - "${NOTIFICATION_PORT}:3002"
    environment: 
      - HOST=${NOTIFICATION_HOST}
      - PORT=${NOTIFICATION_PORT}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - inventory
    networks:
      - stockwatch-net
    restart: unless-stopped


networks:
  stockwatch-net:
    driver: bridge
