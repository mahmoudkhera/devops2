name: Build & Push with Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (tag)"
        required: true
        default: "latest"

jobs:

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build frontend service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops2-frontend:${{ github.event.inputs.version }} ./frontend

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context:  ./frontend
          push: true
          tags: ${{ inputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/devops2-frontend:buildcache,mode=max
            


